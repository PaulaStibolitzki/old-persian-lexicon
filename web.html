<!DOCTYPE html>
<html>
    
    <head>
        <meta charset="UTF-8">
        <title>Old Persian Lexicon</title>
        
        <link rel="stylesheet" href="style.css">
        
    </head>
    
    <body>
        
        <h1>Old Persian Lexicon - based on Tolman (1908) </h1>
        
        <h3>Search Old Persian</h3>
        
        <input id="searchBox" onkeyup="searchWord()" placeholder="Search">
        <button onclick="clearSearch()">Clear</button>
        
         <div id="filters">
            
            <select id="posFilter" onchange="searchWord()">
                <option value="">All POS</option>
                <option value="verb">verb</option>
                <option value="noun">noun</option>
                <option value="adjective">adjective</option>
                <option value="adverb">adverb</option>
                <option value="pronoun">pronoun</option>
                <option value="conjunction">conjunction</option>
            </select>
            
            <select id="genderFilter" onchange="searchWord()">
                <option value="">All Gender</option>
                <option value="masculine">masculine</option>
                <option value="feminine">feminine</option>
                <option value="neuter">neuter</option>
            </select>
            
        </div>
        
        <div id="alphabet"></div>
        
        <div id="entry"></div>
        
        <hr>
        
        <div id="results"></div>
        
        <script src="search.js"></script>
        
    </body>
    
</html>
